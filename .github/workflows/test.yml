name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Compile check (catches syntax errors before tests even run)
        run: python -m py_compile pii_blast_radius/*.py scripts/*.py

      - name: Run tests
        run: pytest tests/ -v
